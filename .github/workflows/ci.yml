name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

    # ยกเลิก run เก่าถ้ามี commit ใหม่เข้ามาบน branch เดียวกัน
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Backend: Go unit tests
  # ─────────────────────────────────────────────────────────────
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      GOTOOLCHAIN: local
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Show Go env
        run: |
          go version
          go env GOROOT GOTOOLCHAIN
      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || (echo "::error::go.mod / go.sum not tidy" && exit 1)

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -v ./...

      - name: Test (race)
        run: go test -race -v ./...

      - name: Test (coverage)
        run: go test -covermode=atomic -coverprofile=coverage.out ./...

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Frontend: Bun unit tests + Next.js build
  # ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Next.js + Bun)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        # ถ้ายังไม่มี bun.lockb ให้ใช้: bun install

      - name: Type check
        run: bunx tsc --noEmit

      - name: Unit tests
        run: bun test

      - name: Build (Next.js)
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
        run: bun run build

  # ─────────────────────────────────────────────────────────────
  # E2E: รัน backend จริง แล้วยิง test จาก /test
  # ─────────────────────────────────────────────────────────────
  e2e:
    name: E2E (backend + test)
    runs-on: ubuntu-latest
    needs: [ backend, frontend ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build backend
        working-directory: backend
        run: go build -o ../bin/server .

      - name: Start backend
        env:
          PORT: "8080"
          JWT_SECRET: "ci-test-secret"
          DB_PATH: "./ci-auth.db"
        run: |
          ./bin/server &
          echo $! > backend.pid
          # รอให้ backend พร้อมรับ request (max 30s)
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/api/health > /dev/null; then
              echo "✅ backend is ready"
              exit 0
            fi
            echo "⏳ waiting for backend... ($i)"
            sleep 1
          done
          echo "::error::backend failed to start"
          exit 1

      - name: Run E2E tests
        working-directory: test
        env:
          API_URL: http://localhost:8080
        run: |
          # ถ้ายังไม่มี package.json ใน /test ให้สร้างชั่วคราวเพื่อให้ bun test รันได้
          if [ ! -f package.json ]; then
            echo '{"name":"e2e","type":"module","devDependencies":{"@types/bun":"latest"}}' > package.json
          fi
          bun install
          bun test

      - name: Stop backend
        if: always()
        run: |
          if [ -f backend.pid ]; then
            kill "$(cat backend.pid)" || true
          fi

  # ─────────────────────────────────────────────────────────────
  # Aggregate gate — branch protection ชี้มาที่ job นี้ตัวเดียวพอ
  # ─────────────────────────────────────────────────────────────
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [ backend, frontend, e2e ]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.backend.result }}" != "success" ] \
            || [ "${{ needs.frontend.result }}" != "success" ] \
            || [ "${{ needs.e2e.result }}" != "success" ]; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi
          echo "✅ All checks passed"
